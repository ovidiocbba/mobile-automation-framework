name: Mobile Execution

on:
  workflow_dispatch:
    inputs:
      scenarioTag:
        description: "Tag to execute"
        required: false
        default: "@regression"
      deviceName:
        description: "Device name"
        required: false
        default: "emulator-5554"
      platformVersion:
        description: "Android version"
        required: false
        default: "13"
      apiLevel:
        description: "Android API Level"
        required: false
        default: "33"
      app:
        description: "APK path"
        required: false
        default: "apps/android/mda-2.2.0-25.apk"
      threads:
        description: "Parallel threads"
        required: false
        default: "1"
      appiumServerUrl:
        description: "Appium server URL"
        required: false
        default: "http://127.0.0.1:4723"

jobs:
  android-tests:
    # IMPORTANT: macos-14 uses Apple Silicon (ARM64) runners
    runs-on: macos-14
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup environment
        uses: ./.github/actions/setup-environment
        with:
          java-ver: 17
          java-distribution: temurin

      - name: Run Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ inputs.apiLevel }}
          target: google_apis
          arch: arm64-v8a # Must be arm64 to run natively on macos-14
          profile: pixel_5
          force-avd-creation: true
          disable-animations: true
          disable-spellchecker: true

          # FIX: Leaving 'cores' empty prevents the 'HV_UNSUPPORTED' error
          # by letting the emulator auto-detect the runner's resources.
          cores: ""

          # GPU and Performance settings for CI
          emulator-options: >-
            -no-window
            -no-audio
            -no-boot-anim
            -no-metrics
            -no-snapshot-load
            -gpu swiftshader_indirect

          emulator-boot-timeout: 600

          # Optimized boot script
          script: |
            echo "Waiting for device to be online..."
            adb wait-for-device

            echo "Checking boot completion status..."
            # The reactivecircus action handles basic waiting,
            # but this loop ensures the Android OS is fully interactive.
            BOOT_STATUS=$(adb shell getprop sys.boot_completed | tr -d '\r')
            while [ "$BOOT_STATUS" != "1" ]; do
              echo "Waiting for system boot... (Current status: ${BOOT_STATUS:-loading})"
              sleep 5
              BOOT_STATUS=$(adb shell getprop sys.boot_completed | tr -d '\r')
            done

            echo "Emulator is ready for testing!"
            adb devices
            adb shell input keyevent 82

      - name: Execute Mobile Tests
        uses: ./.github/actions/execute-mobile-tests
        env:
          USERNAME: ${{ secrets.USERNAME }}
          PASSWORD: ${{ secrets.PASSWORD }}
        with:
          scenarioTag: ${{ inputs.scenarioTag }}
          deviceName: ${{ inputs.deviceName }}
          platformVersion: ${{ inputs.platformVersion }}
          app: ${{ inputs.app }}
          threads: ${{ inputs.threads }}
          appiumServerUrl: ${{ inputs.appiumServerUrl }}

  report:
    needs: android-tests
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate and Deploy Allure Report
        uses: ./.github/actions/generate-report
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
