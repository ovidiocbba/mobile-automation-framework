name: Mobile Execution

on:
  workflow_dispatch:
    inputs:
      scenarioTag:
        description: "Tag to execute"
        required: false
        default: "@regression"

      deviceName:
        description: "Device name"
        required: false
        default: "emulator-5554"

      platformVersion:
        description: "Android version"
        required: false
        default: "14"

      app:
        description: "APK path"
        required: false
        default: "apps/android/mda-2.2.0-25.apk"

      threads:
        description: "Parallel threads"
        required: false
        default: "1"

      appiumServerUrl:
        description: "Appium server URL"
        required: false
        default: "http://127.0.0.1:4723"

jobs:
  android-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup environment
        uses: ./.github/actions/setup-environment
        with:
          java-ver: 17
          java-distribution: temurin

      - name: Run Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ inputs.platformVersion }}
          target: default
          arch: x86_64
          profile: pixel_6
          emulator-options: -no-window -no-audio -no-boot-anim
          disable-animations: true
          script: |
            echo "Emulator ready"
            adb devices

      - name: Execute Mobile Tests
        uses: ./.github/actions/execute-mobile-tests
        env:
          USERNAME: ${{ secrets.USERNAME }}
          PASSWORD: ${{ secrets.PASSWORD }}
        with:
          scenarioTag: ${{ inputs.scenarioTag }}
          deviceName: ${{ inputs.deviceName }}
          platformVersion: ${{ inputs.platformVersion }}
          app: ${{ inputs.app }}
          threads: ${{ inputs.threads }}
          appiumServerUrl: ${{ inputs.appiumServerUrl }}

  report:
    needs: android-tests
    if: always()
    runs-on: ubuntu-latest

    concurrency:
      group: deploy-gh-pages
      cancel-in-progress: true

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate and Deploy Allure Report
        uses: ./.github/actions/generate-report
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
