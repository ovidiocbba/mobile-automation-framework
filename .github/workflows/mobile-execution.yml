name: Mobile Execution

on:
  workflow_dispatch:
    inputs:
      scenarioTag:
        description: "Tag to execute"
        required: false
        default: "@regression"
      deviceName:
        description: "Device name"
        required: false
        default: "emulator-5554"
      platformVersion:
        description: "Android version"
        required: false
        default: "13"
      apiLevel:
        description: "Android API Level"
        required: false
        default: "33"
      app:
        description: "APK path"
        required: false
        default: "apps/android/mda-2.2.0-25.apk"
      threads:
        description: "Parallel threads"
        required: false
        default: "1"
      appiumServerUrl:
        description: "Appium server URL"
        required: false
        default: "http://127.0.0.1:4723"

jobs:
  android-tests:
    # macOS-14 is the key for Apple Silicon performance
    runs-on: macos-14
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup environment
        uses: ./.github/actions/setup-environment
        with:
          java-ver: 17
          java-distribution: temurin

      - name: Run Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ inputs.apiLevel }}
          target: google_apis
          arch: arm64-v8a
          profile: pixel_5
          force-avd-creation: true
          disable-animations: true
          disable-spellchecker: true
          # STRATEGIC FIX: 'cores' parameter is omitted to prevent HVF_UNSUPPORTED crash
          emulator-options: >-
            -no-window
            -no-audio
            -no-boot-anim
            -no-metrics
            -no-snapshot-load
            -gpu swiftshader_indirect
          emulator-boot-timeout: 600
          script: |
            echo "Resetting ADB server..."
            adb kill-server
            adb start-server

            echo "Waiting for device..."
            adb wait-for-device

            echo "Checking boot progress..."
            attempt=0
            while [ $attempt -lt 30 ]; do
              # The 'tr' command is vital to handle Android's carriage return
              BOOT_STATUS=$(adb shell getprop sys.boot_completed | tr -d '\r')
              if [ "$BOOT_STATUS" == "1" ]; then
                echo "Emulator is up and running!"
                break
              fi
              echo "Waiting... (Attempt $attempt, Status: ${BOOT_STATUS:-booting})"
              sleep 10
              attempt=$((attempt+1))
            done

            if [ "$BOOT_STATUS" != "1" ]; then
              echo "Error: Device did not boot in time"
              exit 1
            fi

            adb devices
            # Unlock screen to ensure Appium can interact with the UI immediately
            adb shell input keyevent 82

      - name: Execute Mobile Tests
        uses: ./.github/actions/execute-mobile-tests
        env:
          USERNAME: ${{ secrets.USERNAME }}
          PASSWORD: ${{ secrets.PASSWORD }}
        with:
          scenarioTag: ${{ inputs.scenarioTag }}
          deviceName: ${{ inputs.deviceName }}
          platformVersion: ${{ inputs.platformVersion }}
          app: ${{ inputs.app }}
          threads: ${{ inputs.threads }}
          appiumServerUrl: ${{ inputs.appiumServerUrl }}

  report:
    needs: android-tests
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate and Deploy Allure Report
        uses: ./.github/actions/generate-report
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
