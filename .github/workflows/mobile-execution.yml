name: Mobile Execution

on:
  workflow_dispatch:
    inputs:
      scenarioTag:
        description: "Tag to execute"
        required: false
        default: "@regression"
      deviceName:
        description: "Device name"
        required: false
        default: "emulator-5554"
      platformVersion:
        description: "Android version"
        required: false
        default: "14"
      apiLevel:
        description: "Android API Level (example: 34 for Android 14)"
        required: false
        default: "34"
      app:
        description: "APK path"
        required: false
        default: "apps/android/mda-2.2.0-25.apk"
      threads:
        description: "Parallel threads"
        required: false
        default: "1"
      appiumServerUrl:
        description: "Appium server URL"
        required: false
        default: "http://127.0.0.1:4723"

jobs:
  android-tests:
    # Switched to macos-14 to resolve the HVF_UNSUPPORTED error found in macOS 15 (Sequoia)
    runs-on: macos-14
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup environment
        uses: ./.github/actions/setup-environment
        with:
          java-ver: 17
          java-distribution: temurin

      - name: Run Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ inputs.apiLevel }}
          target: google_apis
          arch: arm64-v8a
          profile: pixel_5
          cores: 4
          # -no-snapshot-load ensures a clean boot and avoids hardware compatibility issues
          emulator-options: -no-window -no-audio -no-boot-anim -no-metrics -no-snapshot-load
          disable-animations: true
          emulator-boot-timeout: 600
          script: |
            echo "Waiting for emulator to be detected by ADB..."
            adb wait-for-device

            echo "Validating ADB connection..."
            timeout=60
            elapsed=0

            while true; do
              # Check for specific device status in the list
              state=$(adb devices | grep "emulator-5554" | awk '{print $2}')

              if [ "$state" = "device" ]; then
                echo "ADB connected and device is online"
                break
              fi

              echo "Current state: ${state:-unknown}. Waiting..."
              sleep 5
              elapsed=$((elapsed+5))

              if [ $elapsed -gt $timeout ]; then
                echo "ADB connection timeout. Current devices list:"
                adb devices
                exit 1
              fi
            done

            echo "Checking Android boot completion..."
            boot_completed=""
            while [ "$boot_completed" != "1" ]; do
              boot_completed=$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')
              if [ "$boot_completed" == "1" ]; then
                break
              fi
              echo "Booting... current status: $boot_completed"
              sleep 5
            done

            echo "Emulator is fully ready for testing"
            adb devices

      - name: Execute Mobile Tests
        uses: ./.github/actions/execute-mobile-tests
        env:
          USERNAME: ${{ secrets.USERNAME }}
          PASSWORD: ${{ secrets.PASSWORD }}
        with:
          scenarioTag: ${{ inputs.scenarioTag }}
          deviceName: ${{ inputs.deviceName }}
          platformVersion: ${{ inputs.platformVersion }}
          app: ${{ inputs.app }}
          threads: ${{ inputs.threads }}
          appiumServerUrl: ${{ inputs.appiumServerUrl }}

  report:
    needs: android-tests
    if: always()
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-gh-pages
      cancel-in-progress: true
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate and Deploy Allure Report
        uses: ./.github/actions/generate-report
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
