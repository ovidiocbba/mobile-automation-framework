name: Mobile Execution
description: Run mobile automation tests using BrowserStack
author: Ovidio Miranda

on:
  workflow_dispatch:
    inputs:
      scenarioTag:
        description: "Tag to execute"
        required: false
        default: "@regression"

      deviceName:
        description: "Device name"
        required: false
        default: "Samsung Galaxy S23"

      platformVersion:
        description: "Android version"
        required: false
        default: "13"

      threads:
        description: "Parallel threads"
        required: false
        default: "1"

jobs:
  execution:
    runs-on: ubuntu-latest

    env:
      USERNAME: ${{ secrets.USERNAME }}
      PASSWORD: ${{ secrets.PASSWORD }}

      BS_USERNAME: ${{ secrets.BS_USERNAME }}
      BS_ACCESS_KEY: ${{ secrets.BS_ACCESS_KEY }}
      BS_APP: ${{ secrets.BS_APP }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Mobile Tests
        # Maximum time allowed for test execution.
        timeout-minutes: 35
        uses: ./.github/actions/execute-mobile-tests
        env:
          USERNAME: ${{ secrets.USERNAME }}
          PASSWORD: ${{ secrets.PASSWORD }}
          BS_USERNAME: ${{ secrets.BS_USERNAME }}
          BS_ACCESS_KEY: ${{ secrets.BS_ACCESS_KEY }}
          BS_APP: ${{ secrets.BS_APP }}
        with:
          scenarioTag: ${{ inputs.scenarioTag || '@regression' }}
          deviceName: ${{ inputs.deviceName }}
          platformVersion: ${{ inputs.platformVersion }}
          platform: ANDROID
          automationName: UiAutomator2
          threads: ${{ inputs.threads }}

  generate-and-deploy-report:
    needs: execution
    # Run report even if execution job fails
    if: always()
    runs-on: ubuntu-latest

    # Prevents two workflows from deploying to 'gh-pages' at the same time.
    concurrency:
      group: deploy-gh-pages
      cancel-in-progress: true

    # These permissions are required to generate reports.
    permissions:
      contents: write # To push a branch (gh_pages).

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate and Deploy Allure Report
        uses: ./.github/actions/generate-report
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
