name: Mobile Execution

on:
  workflow_dispatch:
    inputs:
      scenarioTag:
        description: "Scenario tag to execute (e.g. '@TC-00001')"
        required: false
        default: "@regression"

      device:
        description: "Device (ALL | Samsung Galaxy S23 | Google Pixel 7 | iPhone 15)"
        required: true
        default: ALL

      threads:
        description: "Number of parallel threads for test execution (e.g. '2')"
        required: false
        default: "1"

      explicitWait:
        description: 'Explicit wait timeout in seconds (e.g. "30")'
        required: false
        default: "30"

jobs:
  # Device list comes from repository variable EXECUTION_DEVICES (vars.EXECUTION_DEVICES)
  # To update it go to: Settings → Secrets and variables → Actions → Variables
  prepare-matrix:
    runs-on: ubuntu-latest

    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}

    steps:
      - name: Build dynamic matrix
        id: set-matrix
        shell: bash
        run: |
          DEVICES='${{ vars.EXECUTION_DEVICES }}'

          echo "Selected device: ${{ inputs.device }}"

          if [ "${{ inputs.device }}" = "ALL" ]; then
            echo "Using all devices"
            echo "matrix=$DEVICES" >> $GITHUB_OUTPUT
          else
            echo "Filtering device..."

            FILTERED=$(echo "$DEVICES" | jq --arg device "${{ inputs.device }}" '[.[] | select(.deviceName == $device)]')

            if [ "$FILTERED" = "[]" ]; then
              echo "::error::Device '${{ inputs.device }}' not found"
              echo "Available devices:"
              echo "$DEVICES" | jq -r '.[].deviceName'
              exit 1
            fi

            echo "Using device: ${{ inputs.device }}"
            echo "matrix=$FILTERED" >> $GITHUB_OUTPUT
          fi

  execution:
    needs: prepare-matrix
    runs-on: ubuntu-latest

    strategy:
      # Allow all executions even if one device fails
      fail-fast: false
      matrix:
        # Uses filtered devices from prepare-matrix job
        device: ${{ fromJson(needs.prepare-matrix.outputs.matrix) }}

    env:
      APP_USERNAME: ${{ secrets.APP_USERNAME }}
      APP_PASSWORD: ${{ secrets.APP_PASSWORD }}

      BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
      BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
      BROWSERSTACK_APP_ANDROID: ${{ secrets.BROWSERSTACK_APP_ANDROID }}
      BROWSERSTACK_APP_IOS: ${{ secrets.BROWSERSTACK_APP_IOS }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Mobile Tests
        timeout-minutes: ${{ inputs.device == 'ALL' && 60 || 35 }}
        uses: ./.github/actions/execute-mobile-tests
        env:
          APP_USERNAME: ${{ secrets.APP_USERNAME }}
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
          BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
          BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
          BROWSERSTACK_APP_ANDROID: ${{ secrets.BROWSERSTACK_APP_ANDROID }}
          BROWSERSTACK_APP_IOS: ${{ secrets.BROWSERSTACK_APP_IOS }}
        with:
          scenarioTag: ${{ inputs.scenarioTag || '@regression' }}
          deviceName: ${{ matrix.device.deviceName }}
          platformVersion: ${{ matrix.device.platformVersion }}
          platform: ${{ matrix.device.platform }}
          automationName: ${{ matrix.device.automationName }}
          threads: ${{ inputs.threads }}
          explicitWait: ${{ inputs.explicitWait }}

  generate-and-deploy-report:
    needs: execution
    # Run report even if execution job fails
    if: always()
    runs-on: ubuntu-latest

    # Prevents two workflows from deploying to 'gh-pages' at the same time.
    concurrency:
      group: deploy-gh-pages
      cancel-in-progress: true

    # These permissions are required to generate reports.
    permissions:
      contents: write # To push a branch (gh_pages).

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate and Deploy Allure Report
        uses: ./.github/actions/generate-report
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
