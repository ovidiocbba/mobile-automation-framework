name: Mobile Execution

on:
  workflow_dispatch:
    inputs:
      scenarioTag:
        description: "Tag to execute"
        required: false
        default: "@regression"

      deviceName:
        description: "Device name"
        required: false
        default: "emulator-5554"

      platformVersion:
        description: "Android version"
        required: false
        default: "14"

      apiLevel:
        description: "Android API Level (example: 34 for Android 14)"
        required: false
        default: "34"

      app:
        description: "APK path"
        required: false
        default: "apps/android/mda-2.2.0-25.apk"

      threads:
        description: "Parallel threads"
        required: false
        default: "1"

      appiumServerUrl:
        description: "Appium server URL"
        required: false
        default: "http://127.0.0.1:4723"

jobs:
  android-tests:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup environment
        uses: ./.github/actions/setup-environment
        with:
          java-ver: 17
          java-distribution: temurin

      - name: Run Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ inputs.apiLevel }}
          target: google_apis
          arch: x86_64
          profile: pixel_5
          emulator-options: -no-window -no-audio -no-boot-anim -gpu swiftshader_indirect -no-snapshot
          disable-animations: true
          emulator-boot-timeout: 900
          script: |
            echo "Waiting for emulator..."
            adb wait-for-device

            echo "Checking ADB connection..."
            timeout=30
            elapsed=0

            while true; do
              state=$(adb devices | grep emulator-5554 | awk '{print $2}')

              if [ "$state" = "device" ]; then
                echo "ADB connected successfully"
                break
              fi

              if [ "$state" = "offline" ]; then
                echo "ADB device is offline. Restarting ADB..."
                adb kill-server
                adb start-server
                sleep 5
              fi

              sleep 2
              elapsed=$((elapsed+2))

              if [ $elapsed -gt $timeout ]; then
                echo "ADB did not connect in time"
                adb devices
                exit 1
              fi
            done

            echo "Waiting for Android to finish booting..."

            boot_completed=""
            until [[ "$boot_completed" == "1" ]]; do
              boot_completed=$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')
              echo "Waiting for boot to complete..."
              sleep 5
            done

            echo "Emulator ready"
            adb devices

      - name: Execute Mobile Tests
        uses: ./.github/actions/execute-mobile-tests
        env:
          USERNAME: ${{ secrets.USERNAME }}
          PASSWORD: ${{ secrets.PASSWORD }}
        with:
          scenarioTag: ${{ inputs.scenarioTag }}
          deviceName: ${{ inputs.deviceName }}
          platformVersion: ${{ inputs.platformVersion }}
          app: ${{ inputs.app }}
          threads: ${{ inputs.threads }}
          appiumServerUrl: ${{ inputs.appiumServerUrl }}

  report:
    needs: android-tests
    if: always()
    runs-on: macos-latest

    concurrency:
      group: deploy-gh-pages
      cancel-in-progress: true

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate and Deploy Allure Report
        uses: ./.github/actions/generate-report
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
