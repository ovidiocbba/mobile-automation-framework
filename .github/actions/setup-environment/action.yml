name: Setup Environment
description: "Install Java and configure Gradle cache"

# Inputs the action accepts.
inputs:
  java-ver:
    description: "Java Version"
    required: true
  java-distribution:
    description: "Java Distribution"
    required: true

runs:
  using: "composite"

  steps:
    - name: Set up JDK (ARM64)
      uses: actions/setup-java@v4
      with:
        java-version: ${{ inputs.java-ver }}
        distribution: ${{ inputs.java-distribution }}
        architecture: arm64
        cache: gradle

    - name: Verify Java
      shell: bash
      run: |
        java -version
