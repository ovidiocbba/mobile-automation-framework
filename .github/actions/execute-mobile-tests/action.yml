name: Execute Mobile Tests
description: Run mobile automation tests using BrowserStack
author: Ovidio Miranda

inputs:
  scenarioTag:
    description: "Cucumber tag to execute"
    required: false
    default: "@regression"

  deviceName:
    description: "Device name"
    required: false
    default: "Samsung Galaxy S23"

  platformVersion:
    description: "Android version"
    required: false
    default: "13"

  platform:
    description: "Platform (ANDROID | IOS)"
    required: false
    default: "ANDROID"

  automationName:
    description: "Automation engine (UiAutomator2 | XCUITest)"
    required: false
    default: "UiAutomator2"

  explicitWait:
    description: 'Explicit wait timeout in seconds (e.g. "30")'
    required: true
    default: "30"

  threads:
    description: "Number of parallel threads"
    required: false
    default: "1"

runs:
  using: "composite"
  steps:
    - name: Setup JDK
      uses: ./.github/actions/setup-environment
      with:
        java-ver: "17"
        java-distribution: "temurin"
        java-architecture: "x64"

    - name: Normalize device name
      id: normalize
      shell: bash
      run: |
        DEVICE_ID=$(echo "${{ inputs.deviceName }}" | tr '[:upper:]' '[:lower:]' | tr ' ' '-' | tr -cd 'a-z0-9-')
        echo "device_id=$DEVICE_ID" >> "$GITHUB_OUTPUT"

    - name: Run Mobile Tests (BrowserStack)
      shell: bash
      run: |
        set +e

        echo "================================="
        echo "Running mobile tests"
        echo "Platform: ${{ inputs.platform }}"
        echo "Device: ${{ inputs.deviceName }}"
        echo "Platform Version: ${{ inputs.platformVersion }}"
        echo "Automation: ${{ inputs.automationName }}"
        echo "================================="

        # Validate credentials
        REQUIRED_VARS=("APP_USERNAME" "APP_PASSWORD" "BROWSERSTACK_USERNAME" "BROWSERSTACK_ACCESS_KEY" "BROWSERSTACK_APP_ANDROID" "BROWSERSTACK_APP_IOS")

        for var in "${REQUIRED_VARS[@]}"; do
         if [ -z "${!var:-}" ]; then
          echo "::error::Missing required environment variable: $var"
          exit 1
         fi
        done

        # Select correct app based on platform
        if [ "${{ inputs.platform }}" = "IOS" ]; then
          APP=${BROWSERSTACK_APP_IOS}
        else
          APP=${BROWSERSTACK_APP_ANDROID}
        fi

        echo "Using app: $APP"

        DEVICE_ID="${{ steps.normalize.outputs.device_id }}"

        CI_NAME="github"
        BRANCH=$(echo "${GITHUB_REF_NAME}" | tr '[:upper:]' '[:lower:]' | tr ' ' '-' | tr -cd 'a-z0-9-')
        SHORT_COMMIT=$(echo $GITHUB_SHA | cut -c1-7)

        # Build naming convention:
        # <ci>-<branch>-<buildNumber>-<commit>-<deviceId>
        # Example: github-main-58-a1b2c3-samsung-galaxy-s23
        BUILD_NAME="${CI_NAME}-${BRANCH}-${GITHUB_RUN_NUMBER}-${SHORT_COMMIT}-${DEVICE_ID}"

        CORE_PARAMS=(
        "-Dframework.execution=browserstack"
        "-Dcucumber.filter.tags=${{ inputs.scenarioTag }}"
        "-Dapp.username=${APP_USERNAME}"
        "-Dapp.password=${APP_PASSWORD}"
        "-Dframework.explicitWait=${{ inputs.explicitWait }}"
        "-Dframework.threads=${{ inputs.threads }}"
        )

        BROWSERSTACK_PARAMS=(
        "-Dbrowserstack.username=${BROWSERSTACK_USERNAME}"
        "-Dbrowserstack.accessKey=${BROWSERSTACK_ACCESS_KEY}"
        "-Dbrowserstack.url=https://hub-cloud.browserstack.com/wd/hub"
        "-Dbrowserstack.projectName=mobile-automation-framework"
        "-Dbrowserstack.buildName=${BUILD_NAME}"
        "-Dbrowserstack.app=${APP}"
        "-Dbrowserstack.appiumVersion=2.0.1"
        "-Dbrowserstack.video=true"
        "-Dbrowserstack.deviceLogs=true"
        "-Dbrowserstack.appiumLogs=true"
        "-Dbrowserstack.networkLogs=true"
        )

        DEVICE_PARAMS=(
        "-Dplatform=${{ inputs.platform }}"
        "-DautomationName=${{ inputs.automationName }}"
        "-DdeviceName=${{ inputs.deviceName }}"
        "-DplatformVersion=${{ inputs.platformVersion }}"
        )

        ALL_PARAMS=(
        "${CORE_PARAMS[@]}"
        "${BROWSERSTACK_PARAMS[@]}"
        "${DEVICE_PARAMS[@]}"
        )

        # Gradle flags optimized for CI logs
        GRADLE_FLAGS="--no-daemon --console=plain --warning-mode summary"

        echo "Running tests..."
        ./gradlew clean executeFeatures \
          $GRADLE_FLAGS \
          "${ALL_PARAMS[@]}"

        STATUS=$?

        # Retry failed scenarios
        if [ "$STATUS" -ne 0 ]; then
          echo "Tests failed. Re-running failed scenarios..."
          sleep 5
          ./gradlew reExecuteFeatures \
            $GRADLE_FLAGS \
            "${ALL_PARAMS[@]}"

          STATUS=$?
        else
          echo "All tests passed. No retry needed."
        fi

        echo "Final status: $STATUS"
        exit $STATUS

    - name: Upload logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: logs-${{ steps.normalize.outputs.device_id }}
        path: build/logs
        retention-days: 5

    - name: Upload Allure Results (per device)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-results-${{ steps.normalize.outputs.device_id }}
        path: build/allure-results
        retention-days: 5
