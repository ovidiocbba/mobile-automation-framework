name: Execute Mobile Tests
description: Run mobile automation tests using BrowserStack

inputs:
  scenarioTag:
    description: "Cucumber tag to execute"
    required: false
    default: "@regression"

  deviceName:
    description: "Device name"
    required: false
    default: "Samsung Galaxy S23"

  platformVersion:
    description: "Android version"
    required: false
    default: "13"

  threads:
    description: "Number of parallel threads"
    required: false
    default: "1"

runs:
  using: "composite"
  steps:
    - name: Setup JDK
      uses: ./.github/actions/setup-environment
      with:
        java-ver: "17"
        java-distribution: "temurin"
        java-architecture: "x64"

    - name: Grant Gradle permissions
      shell: bash
      run: chmod +x gradlew

    - name: Run Android Tests (BrowserStack)
      shell: bash
      run: |
        set +e

        echo "================================="
        echo "Running Android tests"
        echo "================================="

        # Validate credentials
        if [ -z "$USERNAME" ] || [ -z "$PASSWORD" ] || \
        [ -z "$BS_USERNAME" ] || [ -z "$BS_ACCESS_KEY" ] || [ -z "$BS_APP" ]; then
         echo "Required credentials not found"
         exit 1
        fi

        COMMON_PARAMS="\
        -Dcucumber.filter.tags=${{ inputs.scenarioTag }} \
        -Dusername=${USERNAME} \
        -Dpassword=${PASSWORD} \
        -Dexecution=browserstack \
        -Dplatform=ANDROID \
        -DdeviceName=\"${{ inputs.deviceName }}\" \
        -DplatformVersion="${{ inputs.platformVersion }}" \
        -DautomationName=UiAutomator2 \
        -Dbs.username=${BS_USERNAME} \
        -Dbs.accessKey=${BS_ACCESS_KEY} \
        -Dbs.url=https://hub.browserstack.com/wd/hub \
        -Dbs.app=${BS_APP} \
        -Dbs.projectName=\"Mobile Automation Framework\" \
        -Dbs.buildName=\"GitHub Build $GITHUB_RUN_NUMBER\" \
        -Dbs.video=true \
        -Dbs.deviceLogs=true \
        -Dbs.appiumLogs=true \
        -Dbs.networkLogs=true \
        -Dbs.appiumVersion=2.0.1 \
        -Dthreads=${{ inputs.threads }}"

        # Gradle flags optimized for CI logs
        GRADLE_FLAGS="--no-daemon --console=plain --warning-mode summary"

        echo "Running tests..."
        ./gradlew clean executeFeatures \
          $GRADLE_FLAGS \
          $COMMON_PARAMS

        STATUS=$?

        # Retry failed scenarios
        if [ "$STATUS" -ne 0 ]; then
          echo "Re-running failed tests..."
          ./gradlew reExecuteFeatures \
            $GRADLE_FLAGS \
            $COMMON_PARAMS
        else
          echo "All tests passed. No retry needed."
        fi

    - name: Upload logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: mobile-logs-${{ github.run_id }}
        path: build/logs
        retention-days: 5

    - name: Upload Allure Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-results-android-${{ github.run_id }}
        path: build/allure-results
        retention-days: 5
