name: Execute Mobile Tests
description: Run mobile automation tests using BrowserStack
author: Ovidio Miranda

inputs:
  scenarioTag:
    description: "Cucumber tag to execute"
    required: false
    default: "@regression"

  deviceName:
    description: "Device name"
    required: false
    default: "Samsung Galaxy S23"

  platformVersion:
    description: "Android version"
    required: false
    default: "13"

  platform:
    description: "Platform (ANDROID | IOS)"
    required: false
    default: "ANDROID"

  automationName:
    description: "Automation engine (UiAutomator2 | XCUITest)"
    required: false
    default: "UiAutomator2"

  explicitWait:
    description: 'Explicit wait timeout in seconds (e.g. "30")'
    required: true
    default: "30"

  threads:
    description: "Number of parallel threads"
    required: false
    default: "1"

runs:
  using: "composite"
  steps:
    - name: Setup JDK
      uses: ./.github/actions/setup-environment
      with:
        java-ver: "17"
        java-distribution: "temurin"
        java-architecture: "x64"

    - name: Normalize device name
      id: normalize
      shell: bash
      run: |
        DEVICE_ID=$(echo "${{ inputs.deviceName }}" | tr '[:upper:]' '[:lower:]' | tr ' ' '-' | tr -cd 'a-z0-9-')
        echo "device_id=$DEVICE_ID" >> "$GITHUB_OUTPUT"

    - name: Run Mobile Tests (BrowserStack)
      shell: bash
      run: |
        set +e

        echo "================================="
        echo "Running mobile tests"
        echo "Device: ${{ inputs.deviceName }}"
        echo "================================="

        # Validate credentials
        REQUIRED_VARS=("USERNAME" "PASSWORD" "BS_USERNAME" "BS_ACCESS_KEY" "BS_APP")

        for var in "${REQUIRED_VARS[@]}"; do
         if [ -z "${!var:-}" ]; then
          echo "::error::Missing required environment variable: $var"
          exit 1
         fi
        done

        DEVICE_ID="${{ steps.normalize.outputs.device_id }}"
        BUILD_NAME="GH-${GITHUB_RUN_NUMBER}-${DEVICE_ID}"

        CORE_PARAMS=(
        "-Dexecution=browserstack"
        "-Dcucumber.filter.tags=${{ inputs.scenarioTag }}"
        "-Dusername=${USERNAME}"
        "-Dpassword=${PASSWORD}"
        "-DexplicitWait=${{ inputs.explicitWait }}"
        "-Dthreads=${{ inputs.threads }}"
        )

        BS_PARAMS=(
        "-Dbs.username=${BS_USERNAME}"
        "-Dbs.accessKey=${BS_ACCESS_KEY}"
        "-Dbs.url=https://hub-cloud.browserstack.com/wd/hub"
        "-Dbs.app=${BS_APP}"
        "-Dbs.projectName=Mobile-Automation-Framework"
        "-Dbs.buildName=${BUILD_NAME}"
        "-Dbs.video=true"
        "-Dbs.deviceLogs=true"
        "-Dbs.appiumLogs=true"
        "-Dbs.networkLogs=true"
        "-Dbs.appiumVersion=2.0.1"
        )

        DEVICE_PARAMS=(
        "-Dplatform=${{ inputs.platform }}"
        "-DdeviceName=${{ inputs.deviceName }}"
        "-DplatformVersion=${{ inputs.platformVersion }}"
        "-DautomationName=${{ inputs.automationName }}"
        )

        ALL_PARAMS=(
        "${CORE_PARAMS[@]}"
        "${BS_PARAMS[@]}"
        "${DEVICE_PARAMS[@]}"
        )

        # Gradle flags optimized for CI logs
        GRADLE_FLAGS="--no-daemon --console=plain --warning-mode summary"

        echo "Running tests..."
        ./gradlew clean executeFeatures \
          $GRADLE_FLAGS \
          "${ALL_PARAMS[@]}"

        STATUS=$?

        # Retry failed scenarios
        if [ "$STATUS" -ne 0 ]; then
          echo "Tests failed. Re-running failed scenarios..."
          sleep 5
          ./gradlew reExecuteFeatures \
            $GRADLE_FLAGS \
            "${ALL_PARAMS[@]}"

          STATUS=$?
        else
          echo "All tests passed. No retry needed."
        fi

        echo "Final status: $STATUS"
        exit $STATUS

    - name: Upload logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: logs-${{ steps.normalize.outputs.device_id }}
        path: build/logs
        retention-days: 5

    - name: Upload Allure Results (per device)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-results-${{ steps.normalize.outputs.device_id }}
        path: build/allure-results
        retention-days: 5
