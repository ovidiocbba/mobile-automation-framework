# ========================================
# EXECUTION MODE
# ========================================
# Supported: local | browserstack
framework.execution=browserstack

# ========================================
# BROWSERSTACK CONFIG
# ========================================
# Authentication
browserstack.username=YOUR_USERNAME
browserstack.accessKey=YOUR_ACCESS_KEY
browserstack.url=https://hub-cloud.browserstack.com/wd/hub

# Project metadata (Dashboard)
browserstack.projectName=Mobile Automation Framework
browserstack.buildName=Build 1

# BrowserStack app (bs://<app-id>)
# Use the correct app for Android or iOS
browserstack.app=bs://<your-app-id>

# Appium version used in BrowserStack
browserstack.appiumVersion=2.0.1

# Logs & debugging
browserstack.video=true
browserstack.deviceLogs=true
browserstack.appiumLogs=true
browserstack.networkLogs=true
