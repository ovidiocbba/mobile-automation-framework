unclassified:
  # extendedEmailPublisher → Builds the rich HTML email used by emailext()
  extendedEmailPublisher:
    mailAccount:
      smtpHost: "smtp.office365.com"
      smtpPort: 587
      useTls: true
      smtpUsername: "${SMTP_USERNAME}"
      smtpPassword: "${SMTP_PASSWORD}"
      address: "${SMTP_FROM}"

    defaultContentType: "text/html"
    defaultSubject: "Jenkins Build Report"
    adminRequiredForTemplateTesting: false

  # mailer → Base SMTP engine that actually sends the email
  mailer:
    smtpHost: "smtp.office365.com"
    smtpPort: "587"
    useTls: true
    replyToAddress: "${SMTP_FROM}"
    authentication:
      username: "${SMTP_USERNAME}"
      password: "${SMTP_PASSWORD}"
