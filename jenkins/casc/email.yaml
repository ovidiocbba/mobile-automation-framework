unclassified:
  location:
    adminAddress: "${SMTP_FROM}"

  # extendedEmailPublisher → Builds the rich HTML email used by emailext()
  email-ext:
    mailAccount:
      smtpHost: "${SMTP_HOST}"
      smtpPort: "${SMTP_PORT}"
      useTls: true
      credentialsId: "SMTP_CREDENTIALS"
      address: "${SMTP_FROM}"

    defaultContentType: "text/html"
    defaultSubject: "Jenkins Build Report"
    adminRequiredForTemplateTesting: false

  # mailer → Base SMTP engine that actually sends the email
  mailer:
    smtpHost: "${SMTP_HOST}"
    smtpPort: "${SMTP_PORT}"
    useTls: true
    replyToAddress: "${SMTP_FROM}"
    authentication:
      credentialsId: "SMTP_CREDENTIALS"
