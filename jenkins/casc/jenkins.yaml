jenkins:
  systemMessage: "Jenkins configured automatically via JCasC"

  globalNodeProperties:
    - envVars:
        env:
          - key: "SUPPORTED_DEVICES"
            value: ${SUPPORTED_DEVICES}
          - key: "GIT_REPO"
            value: ${GIT_REPO}
          - key: "GIT_BRANCH"
            value: ${GIT_BRANCH}

# Note:
# We do not use "casc.configurations" here.
# Dockerfile already defines:
# ENV CASC_JENKINS_CONFIG=/var/jenkins_home/casc
# Jenkins automatically loads all YAML files from that folder.
