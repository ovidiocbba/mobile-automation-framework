# Set real values in Jenkins UI after first startup.
# Manage Jenkins → Credentials → Global
credentials:
  system:
    domainCredentials:
      - credentials:

          - usernamePassword:
              scope: GLOBAL
              id: "APP_USERNAME"
              username: "${APP_USERNAME}"
              password: "${APP_PASSWORD}"
              description: "App login credentials"

          - usernamePassword:
              scope: GLOBAL
              id: "SMTP_CREDENTIALS"
              username: "${SMTP_USERNAME}"
              password: "${SMTP_PASSWORD}"
              description: "SMTP account used to send automation reports"

          - string:
              scope: GLOBAL
              id: "BROWSERSTACK_USERNAME"
              secret: "${BROWSERSTACK_USERNAME}"
              description: "BrowserStack username"

          - string:
              scope: GLOBAL
              id: "BROWSERSTACK_ACCESS_KEY"
              secret: "${BROWSERSTACK_ACCESS_KEY}"
              description: "BrowserStack access key"

          - string:
              scope: GLOBAL
              id: "BROWSERSTACK_APP_ANDROID"
              secret: "${BROWSERSTACK_APP_ANDROID}"
              description: "BrowserStack Android app"

          - string:
              scope: GLOBAL
              id: "BROWSERSTACK_APP_IOS"
              secret: "${BROWSERSTACK_APP_IOS}"
              description: "BrowserStack iOS app"
