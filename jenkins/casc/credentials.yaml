# Set real values in Jenkins UI after first startup.
# Manage Jenkins → Credentials → Global
credentials:
  system:
    domainCredentials:
      - credentials:

          - usernamePassword:
              scope: GLOBAL
              id: "USERNAME"
              username: "replace-me"
              password: "replace-me"
              description: "App login credentials"

          - string:
              scope: GLOBAL
              id: "BS_USERNAME"
              secret: "replace-me"
              description: "BrowserStack username"

          - string:
              scope: GLOBAL
              id: "BS_ACCESS_KEY"
              secret: "replace-me"
              description: "BrowserStack access key"

          - string:
              scope: GLOBAL
              id: "BS_APP"
              secret: "replace-me"
              description: "BrowserStack app id"
