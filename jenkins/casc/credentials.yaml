# Set real values in Jenkins UI after first startup.
# Manage Jenkins → Credentials → Global
credentials:
  system:
    domainCredentials:
      - credentials:

          - usernamePassword:
              scope: GLOBAL
              id: "USERNAME"
              username: "${APP_USERNAME}"
              password: "${APP_PASSWORD}"
              description: "App login credentials"

          - string:
              scope: GLOBAL
              id: "BS_USERNAME"
              secret: "${BS_USERNAME}"
              description: "BrowserStack username"

          - string:
              scope: GLOBAL
              id: "BS_ACCESS_KEY"
              secret: "${BS_ACCESS_KEY}"
              description: "BrowserStack access key"

          - string:
              scope: GLOBAL
              id: "BS_APP"
              secret: "${BS_APP}"
              description: "BrowserStack app id"
